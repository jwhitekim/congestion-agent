<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLM Agent Demo</title>
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <div class="viewer">
          <video id="preview" class="video-preview" controls muted playsinline></video>
          <div id="emptyState" class="empty-state">
            <div class="empty-icon">□</div>
            <div>Select a video to analyze</div>
          </div>
        </div>

        <aside class="control-panel">
          <header class="panel-header">
            <div>
              <h1>LLM Agent Demo</h1>
              <p>Tool-use based congestion analysis</p>
            </div>
            <span id="statusBadge" class="status-badge idle">Idle</span>
          </header>

          <form id="analysisForm" class="analysis-form">
            <label class="field">
              <span>Video file</span>
              <input id="videoInput" name="video" type="file" accept="video/*" required />
            </label>

            <div class="field-grid">
              <label class="field">
                <span>Model</span>
                <select name="model">
                  <option value="opus">Opus</option>
                  <option value="sonnet">Sonnet</option>
                  <option value="haiku">Haiku</option>
                </select>
              </label>

              <label class="field">
                <span>Interval sec</span>
                <input name="interval" type="number" min="1" step="1" value="5" />
              </label>
            </div>

            <input name="domain" type="hidden" value="congestion" />

            <button id="submitButton" class="primary-button" type="submit">
              <span class="button-icon">▶</span>
              Analyze
            </button>
          </form>

          <div id="fileInfo" class="file-info"></div>
        </aside>
      </section>

      <!-- 분석 결과 섹션 — 분석 완료 후 표시 -->
      <section id="resultsSection" class="results-section" hidden>
        <div class="results-header">
          <span class="results-title">분석 결과</span>
          <span id="resultsMeta" class="results-meta"></span>
        </div>

        <!-- 혼잡도 흐름 타임라인 (텍스트 기반 띠) -->
        <div id="timelineStrip" class="timeline-strip" title="세그먼트별 혼잡도 흐름"></div>
        <div id="timelineLabels" class="timeline-labels"></div>

        <!-- 프레임 카드 리스트 (아코디언) -->
        <div id="frameCards" class="frame-cards"></div>
      </section>
    </main>

    <script src="/public/app.js"></script>
  </body>
</html>
